# Termux DNS Rotator configuration
# Copy this to ~/.config/dns-rotator/config and edit as needed

# Rotation interval in seconds (default 300 = 5 minutes)
INTERVAL=300

# List of DNS servers. Each entry is one or more space-separated IPs.
# The rotator cycles through these entries sequentially.
DNS_LIST=(
  "1.1.1.1 1.0.0.1"                 # Cloudflare
  "8.8.8.8 8.8.4.4"                 # Google
  "9.9.9.9 149.112.112.112"         # Quad9
  "94.140.14.14 94.140.15.15"       # AdGuard
  "208.67.222.222 208.67.220.220"   # OpenDNS
  "76.76.2.0 76.76.10.0"            # Control D
  "45.90.28.0 45.90.30.0"           # NextDNS public
)
